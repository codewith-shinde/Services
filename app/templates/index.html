<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mail & Calendar Assistant</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Dynamic Canvas Background -->
    <div class="bg-canvas">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Custom Cursor -->
    <div class="cursor-blob" id="cursor-blob"></div>
    <div class="cursor-dot" id="cursor-dot"></div>

    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <h1>Shubham's Mail Assistant</h1>
        </div>
        <div class="header-right">
            <div class="punch-tracker" id="punch-tracker" onclick="togglePunchPanel()">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                    <path
                        d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z" />
                </svg>
                <span id="punch-label">Punch In</span>
            </div>
            <div id="status-indicator"></div>
            <div class="notification-bell" onclick="toggleNotifications()">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2zm-2 1H8v-6c0-2.48 1.51-4.5 4-4.5s4 2.02 4 4.5v6z" />
                </svg>
                <span class="notification-badge">0</span>
            </div>
        </div>
    </header>

    <!-- Notifications Panel -->
    <div class="notifications-panel">
        <div class="notifications-header">
            <h3>Notifications</h3>
            <button class="btn btn-outline" onclick="markAllRead()" style="padding: 6px 14px; font-size: 0.78rem;">Mark
                all read</button>
        </div>
        <div class="notifications-list"></div>
    </div>

    <!-- Punch Clock Panel -->
    <div class="punch-panel" id="punch-panel">
        <div class="punch-panel-header">
            <h3>Shift Tracker</h3>
            <span id="shift-config-summary" style="font-size:0.78rem;color:var(--text-secondary);">9h shift (30m recess
                included)</span>
        </div>
        <div class="punch-panel-body">
            <div style="display: flex; flex-direction: column; gap: 16px;">
                <div class="punch-input-row">
                    <label for="punch-time-input">Start Time</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="time" id="punch-time-input" class="punch-time-input" style="flex: 1;">
                        <button class="btn btn-outline" onclick="setNow()" title="Set to current time"
                            style="padding: 10px;">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"></circle>
                                <polyline points="12 6 12 12 16 14"></polyline>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="punch-input-row">
                    <label for="shift-length-select">Shift Duration</label>
                    <select id="shift-length-select" class="punch-time-input" onchange="updateShiftSummary()">
                        <option value="480">8 Hours</option>
                        <option value="510">8.5 Hours</option>
                        <option value="540" selected>9 Hours</option>
                        <option value="570">9.5 Hours</option>
                        <option value="600">10 Hours</option>
                        <option value="660">11 Hours</option>
                        <option value="720">12 Hours</option>
                    </select>
                </div>
            </div>
            <button class="btn btn-primary" id="punch-set-btn" onclick="setPunchIn()"
                style="width:100%; margin-top: 16px;">Sync Shift</button>
            <div id="punch-result" class="punch-result"></div>
        </div>
    </div>

    <!-- Email Detail Overlay + Panel -->
    <div class="email-overlay" onclick="closeEmailDetail()"></div>
    <div class="email-detail"></div>

    <!-- Main Content -->
    <div class="container" id="app">
        <div class="loading">
            <div class="spinner"></div>
            <p>Initializing...</p>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>

</html>
