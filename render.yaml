services:
  - type: web
    name: workhub
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node src/app.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /opt/render/project/src/data/app.db
      - key: PORT
        value: 10000
